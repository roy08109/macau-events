<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macau Events 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#333}
.header{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;padding:30px 20px;text-align:center}
.header h1{font-size:2em}
.header h1 span{color:#FFD700}
.lang-bar{background:#0d1b3e;padding:10px;text-align:center}
.lang-bar button{padding:6px 18px;margin:0 4px;border:1px solid rgba(255,255,255,0.3);background:0 0;color:rgba(255,255,255,0.7);border-radius:4px;cursor:pointer;font-size:14px;font-weight:600}
.lang-bar button.active{background:#FFD700;color:#1a1a2e;border-color:#FFD700}
.container{max-width:1200px;margin:0 auto;padding:20px}
.month-nav{display:flex;gap:8px;overflow-x:auto;padding:15px 0;margin-bottom:20px}
.month-nav button{padding:10px 20px;border:2px solid #0f3460;background:#fff;border-radius:25px;cursor:pointer;font-weight:600;font-size:14px;white-space:nowrap}
.month-nav button.active{background:#0f3460;color:#fff}
.cat-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:25px}
.cat-filters button{padding:6px 16px;border:1px solid #ddd;background:#fff;border-radius:15px;cursor:pointer;font-size:13px}
.cat-filters button.active{background:#FFD700;border-color:#FFD700}
.events-grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
.event-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer}
.event-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.12)}
.event-img{width:100%;height:180px;object-fit:cover;background:#e9ecef}
.event-body{padding:15px}
.event-date{font-size:13px;color:#0f3460;font-weight:600;margin-bottom:5px}
.event-body h3{font-size:16px;margin-bottom:5px;color:#1a1a2e}
.event-body .venue{font-size:13px;color:#666}
.event-body .price{font-size:13px;color:#e74c3c;font-weight:600}
.event-cat{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:6px}
.cat-concert{background:#ffe0e0;color:#c0392b}
.cat-exhibition{background:#e0f0ff;color:#2980b9}
.cat-festival{background:#fff3e0;color:#e67e22}
.cat-sports{background:#e8f5e9;color:#27ae60}
.cat-family{background:#f3e5f5;color:#9c27b0}
.event-desc{font-size:13px;color:#666;margin-top:6px}
.event-links{margin-top:10px}
.event-links a{display:inline-block;padding:5px 14px;background:#0f3460;color:#fff;text-decoration:none;border-radius:4px;font-size:12px}
.footer{text-align:center;padding:30px;color:#999;font-size:13px}
@media(max-width:600px){.header h1{font-size:1.6em}.events-grid{grid-template-columns:1fr}}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-box{background:#fff;border-radius:12px;max-width:550px;width:100%;max-height:85vh;overflow-y:auto;padding:25px;position:relative}
.modal-close{position:absolute;top:10px;right:15px;font-size:28px;cursor:pointer;color:#999;background:none;border:none}
.modal-box img{width:100%;height:250px;object-fit:cover;border-radius:8px;margin-bottom:15px}
.modal-box h2{font-size:22px;margin-bottom:10px}
.modal-box .info{font-size:15px;color:#666;margin:5px 0}
.modal-box .desc{font-size:15px;color:#444;margin:15px 0;line-height:1.8}
.modal-box .btn{display:inline-block;padding:12px 30px;background:#0f3460;color:#fff;text-decoration:none;border-radius:8px;font-size:16px}
</style>
</head>

<div class="header"><h1>🎭 <span id="title">Macau Events</span> 2026</h1><p id="subtitle">Your guide to concerts, exhibitions, festivals & sports</p></div>
<div class="lang-bar">
  <button class="active" onclick="setLang(0)">EN</button>

  <button onclick="setLang(2)">簡</button>
</div>
<div class="container">

    <button class="active" data-m="0">July</button>
    <button data-m="1">August</button>
    <button data-m="2">September</button>
    <button data-m="3">October</button>
  </div>
  <div class="cat-filters" id="catFilters">

<div class="modal" id="modal" onclick="if(event.target==this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>

</div>

<div class="footer"><p>© 2026 Macau Events Guide | Data from Galaxy Macau, Broadway Macau</p></div>

var curLang = 0, curMonth = 0, curCat = "all";

function setLang(l) {
  curLang = l;
  var title = document.getElementById("title");
  var sub = document.getElementById("subtitle");
  if (l === 0) { title.textContent = "Macau Events"; sub.textContent = "Your guide to concerts, exhibitions, festivals & sports"; }
  else if (l === 1) { title.textContent = "澳門活動"; sub.textContent = "演唱會、展覽、節慶、體育賽事指南"; }
  else { title.textContent = "澳门活动"; sub.textContent = "演唱会、展览、节庆、体育赛事指南"; }
  var mBtns = document.querySelectorAll("#monthNav button");
  var mNames = l === 0 ? MONTHS : (l === 1 ? MONTHS_TC : MONTHS_SC);
  for (var i = 0; i < mBtns.length; i++) mBtns[i].textContent = mNames[i];
  var cBtns = document.querySelectorAll("#catFilters button");
  var cNames = l === 0 ? CATS : (l === 1 ? CATS_TC : CATS_SC);
  for (var i = 0; i < cBtns.length; i++) cBtns[i].textContent = cNames[i];
  document.querySelectorAll(".lang-bar button").forEach(function(b) { b.classList.remove("active"); });
  document.querySelectorAll(".lang-bar button")[l].classList.add("active");
  render();
}

function render() {
  var grid = document.getElementById("grid");
  var filtered = [];
  for (var i = 0; i < events.length; i++) {
    var e = events[i];
    if (e.m === curMonth && (curCat === "all" || e.c === curCat)) {
      filtered.push(e);
    }
  }
  filtered.sort(function(a,b) { return a.s - b.s; });
  if (filtered.length === 0) {
    grid.innerHTML = "<div style='text-align:center;padding:40px;color:#999'>No events found</div>";
    return;
  }
  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var dateStr = (curLang === 0 ? MONTHS[e.m] : (curLang === 1 ? MONTHS_TC[e.m] : MONTHS_SC[e.m])) + " " + e.s + (e.s !== e.e ? " - " + e.e : "");
    var desc = curLang === 0 ? e.d_en : (curLang === 1 ? e.d_tc : e.d_sc);
    var priceHtml = e.p ? "<div class='price'>💰 " + e.p + "</div>" : "";
    html += "<div class='event-card' onclick='showModal(" + i + ")'>";
    html += "<img class='event-img' src='" + e.i + "' alt='" + e.t + "' loading='lazy'>";
    html += "<div class='event-body'>";
    html += "<div class='event-date'>" + dateStr + "</div>";
    html += "<span class='event-cat cat-" + e.c + "'>" + getCatEmoji(e.c) + " " + e.c + "</span>";
    html += "<h3>" + e.t + "</h3>";
    html += "<div class='venue'>📍 " + e.v + "</div>";
    html += priceHtml;
    html += "<div class='event-desc'>" + desc + "</div>";
    html += "</div></div>";
  }
  grid.innerHTML = html;
}

function getCatEmoji(c) {
  if (c === "concert") return "🎤";
  if (c === "exhibition") return "🎨";
  if (c === "festival") return "🏮";
  if (c === "sports") return "🏃";
  if (c === "family") return "👨‍👩‍👧";
  return "📌";
}

function showModal(idx) {
  var e = events[idx];
  var desc = curLang === 0 ? e.d_en : (curLang === 1 ? e.d_tc : e.d_sc);
  var dateStr = (curLang === 0 ? MONTHS[e.m] : (curLang === 1 ? MONTHS_TC[e.m] : MONTHS_SC[e.m])) + " " + e.s + (e.s !== e.e ? " - " + e.e : "");
  var priceHtml = e.p ? "<p style='font-size:18px;color:#e74c3c;font-weight:600'>💰 " + e.p + "</p>" : "";
  var getTickets = curLang === 0 ? "🎫 Get Tickets" : (curLang === 1 ? "🎫 購票" : "🎫 购票");
  
  var body = document.getElementById("modalBody");
  body.innerHTML = "<img src='" + e.i + "' alt='" + e.t + "'>";
  body.innerHTML += "<span class='event-cat cat-" + e.c + "'>" + getCatEmoji(e.c) + " " + e.c + "</span>";
  body.innerHTML += "<h2>" + e.t + "</h2>";
  body.innerHTML += "<p class='info'>📅 " + dateStr + "</p>";
  body.innerHTML += "<p class='info'>📍 " + e.v + "</p>";
  body.innerHTML += priceHtml;
  body.innerHTML += "<p class='desc'>" + desc + "</p>";
  body.innerHTML += "<a class='btn' href='" + e.l + "' target='_blank'>" + getTickets + "</a>";
  
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.getElementById("monthNav").addEventListener("click", function(ev) {
  var btn = ev.target.closest("button");
  if (!btn) return;
  document.querySelectorAll("#monthNav button").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  curMonth = parseInt(btn.getAttribute("data-m"));
  render();
});

document.getElementById("catFilters").addEventListener("click", function(ev) {
  var btn = ev.target.closest("button");
  if (!btn) return;
  document.querySelectorAll("#catFilters button").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  curCat = btn.getAttribute("data-c");
  render();
});

render();
</script>
</body>
</html>
